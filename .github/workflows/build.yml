name: Release DDNS Tools
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact_name: linux-x64-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-x64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-arm64
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Build Release
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package Artifacts
        shell: bash
        run: |
          mkdir -p ./dist/
          EXT=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then EXT=".exe"; fi
          cp target/${{ matrix.target }}/release/ddns-client${EXT} ./dist/ddns-client-${{ matrix.artifact_name }}
          cp target/${{ matrix.target }}/release/ddns-server${EXT} ./dist/ddns-server-${{ matrix.artifact_name }}
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}